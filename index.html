<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Англійські слова</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    padding: 20px;
  }
  .card {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 20px;
    padding: 32px;
    width: 460px;
    max-width: 94vw;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
  }
  h1 { font-size: 24px; margin-bottom: 16px; font-weight: 600; }
  .stats {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
    font-size: 18px;
  }
  .stats .label { opacity: 0.7; font-size: 13px; display: block; }
  #timer.low { color: #ff6b6b; }
  .mode-hint {
    font-size: 13px;
    opacity: 0.65;
    margin-bottom: 8px;
    letter-spacing: 0.3px;
  }
  .word-display {
    font-size: 48px;
    font-weight: 700;
    letter-spacing: 1px;
    margin: 4px 0 20px;
    min-height: 64px;
    word-break: break-word;
    line-height: 1.15;
  }
  #answer {
    width: 100%;
    font-size: 28px;
    text-align: center;
    padding: 14px;
    border: none;
    border-radius: 14px;
    background: #fff;
    color: #1e3c72;
    outline: 3px solid transparent;
    transition: outline-color 0.15s;
  }
  #answer:focus { outline-color: #ffd166; }
  button {
    font-size: 18px;
    font-weight: 600;
    padding: 12px 32px;
    border: none;
    border-radius: 14px;
    background: #ffd166;
    color: #1e3c72;
    cursor: pointer;
    transition: transform 0.1s, filter 0.15s;
  }
  button:hover { filter: brightness(1.08); }
  button:active { transform: scale(0.96); }
  #start-btn, #restart-btn { margin-top: 22px; }
  .skip {
    margin-top: 12px;
    font-size: 15px;
    padding: 9px 26px;
    background: rgba(255, 255, 255, 0.16);
    color: #fff;
  }
  .hidden { display: none; }

  /* mode selector */
  .mode-select { margin: 20px 0 8px; }
  .mode-select p { opacity: 0.8; font-size: 14px; margin-bottom: 10px; }
  .mode-btns { display: flex; gap: 10px; justify-content: center; }
  .mode-btn {
    flex: 1;
    max-width: 180px;
    font-size: 16px;
    padding: 12px 10px;
    background: rgba(255,255,255,0.12);
    color: #fff;
    border-radius: 12px;
  }
  .mode-btn.active { background: #ffd166; color: #1e3c72; }

  /* start screen description */
  #start-screen p.desc {
    font-size: 15px;
    opacity: 0.8;
    line-height: 1.55;
  }

  /* result */
  .result { font-size: 20px; line-height: 1.6; }
  .result .big { font-size: 52px; font-weight: 700; color: #ffd166; }
  .summary { margin: 14px 0 10px; font-size: 15px; opacity: 0.85; }
  .filter-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
  .tab {
    flex: 1;
    font-size: 14px;
    padding: 9px 6px;
    background: rgba(255, 255, 255, 0.12);
    color: #fff;
  }
  .tab.active { background: #ffd166; color: #1e3c72; }
  .results-list {
    max-height: 260px;
    overflow-y: auto;
    text-align: left;
    border-radius: 12px;
  }
  .row {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    padding: 9px 12px;
    font-size: 14px;
    border-radius: 8px;
    margin-bottom: 4px;
  }
  .row.correct { background: rgba(76, 217, 123, 0.18); }
  .row.wrong   { background: rgba(255, 107, 107, 0.20); }
  .row.skipped { background: rgba(255, 255, 255, 0.10); }
  .row .mark { white-space: nowrap; opacity: 0.95; font-weight: 600; }
  .empty { padding: 24px; opacity: 0.7; }

  /* correction panel */
  .correction {
    margin-top: 14px;
    padding: 13px 16px;
    background: rgba(255,107,107,0.18);
    border: 1px solid rgba(255,107,107,0.38);
    border-radius: 14px;
    font-size: 15px;
    text-align: left;
    line-height: 1.55;
    animation: popIn 0.2s ease;
  }
  .correction .corr-label { opacity: 0.75; font-size: 13px; }
  .correction .corr-answer { font-weight: 700; font-size: 18px; color: #ffd166; }
  .correction .corr-trans { font-size: 15px; opacity: 0.8; font-family: monospace; letter-spacing: 0.4px; margin-top: 2px; }
  .correction .corr-hint { font-size: 13px; opacity: 0.65; margin-top: 4px; }
  #answer.wrong { outline-color: #ff6b6b !important; }
  @keyframes popIn {
    from { opacity: 0; transform: translateY(-5px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="card">
  <h1>Англійські слова</h1>

  <!-- START SCREEN -->
  <div id="start-screen">
    <p class="desc">У тебе 60 секунд. Перекладай слова якомога швидше.<br>Oxford 1000 — найважливіші слова англійської.</p>
    <div class="mode-select">
      <p>Оберіть режим:</p>
      <div class="mode-btns">
        <button id="btn-ua-en" class="mode-btn active">🇺🇦 → 🇬🇧</button>
        <button id="btn-en-ua" class="mode-btn">🇬🇧 → 🇺🇦</button>
      </div>
    </div>
    <button id="start-btn">Почати</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="game" class="hidden">
    <div class="stats">
      <div><span class="label">Час</span><span id="timer">60</span></div>
      <div><span class="label">Правильних</span><span id="score">0</span></div>
    </div>
    <div class="mode-hint" id="mode-hint">Перекладіть англійською:</div>
    <div class="word-display" id="word-display">—</div>
    <input id="answer" type="text" placeholder="Переклад" autocomplete="off" autocorrect="off" spellcheck="false">
    <button id="skip-btn" class="skip">Пропустити</button>
    <div id="correction" class="correction hidden">
      <div class="corr-label">Правильна відповідь:</div>
      <div class="corr-answer" id="correction-answer"></div>
      <div class="corr-trans" id="correction-trans"></div>
      <div class="corr-hint">Enter або «Пропустити» — далі</div>
    </div>
  </div>

  <!-- END SCREEN -->
  <div id="end-screen" class="hidden">
    <div class="result">
      Час вийшов!<br>
      <span class="big" id="final-score">0</span><br>
      правильних відповідей
    </div>
    <div class="summary" id="summary"></div>
    <div class="filter-tabs">
      <button id="tab-all" class="tab active">Усі</button>
      <button id="tab-bad" class="tab">Помилки і пропуски</button>
    </div>
    <div class="results-list" id="results-list"></div>
    <button id="restart-btn">Спробувати ще раз</button>
  </div>
</div>

const btnEnUa        = document.getElementById("btn-en-ua");
const correctionEl   = document.getElementById("correction");
const corrAnswerEl   = document.getElementById("correction-answer");

function getEn(w) { return Array.isArray(w.en) ? w.en : [w.en]; }
function getUa(w) { return Array.isArray(w.ua) ? w.ua : [w.ua]; }

let mode = "ua-en";
let score = 0;
let timeLeft = DURATION;
let currentWord = null;
let currentShown = "";
let intervalId = null;
let records = [];
let currentFilter = "all";
let shuffledIndices = [];
let shufflePos = 0;
let waitingForLastAnswer = false;
let awaitingAfterWrong = false;
let correctionTimer = null;

function setMode(m) {
  mode = m;
  btnUaEn.classList.toggle("active", m === "ua-en");
  btnEnUa.classList.toggle("active", m === "en-ua");
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function nextWord() {
  hideCorrection();
  if (shufflePos >= shuffledIndices.length) {
    shuffledIndices = shuffle([...Array(WORDS.length).keys()]);
    shufflePos = 0;
  }
  currentWord = WORDS[shuffledIndices[shufflePos++]];
  const vals = mode === "ua-en" ? getUa(currentWord) : getEn(currentWord);
  currentShown = vals[Math.floor(Math.random() * vals.length)];
  wordDisplay.textContent = currentShown;
  answerEl.value = "";
  answerEl.focus();
}

function isCorrect(input) {
  const inp = input.toLowerCase().trim();
  if (inp === "") return false;
  const shownUa = getUa(currentWord);
  if (mode === "en-ua") {
    return shownUa.some(u => u.toLowerCase() === inp);
  } else {
    return WORDS.some(w =>
      getUa(w).some(u => shownUa.includes(u)) &&
      getEn(w).some(e => e.toLowerCase() === inp)
    );
  }
}

function getCorrectAnswer() {
  if (mode === "ua-en") {
    const shownUa = getUa(currentWord);
    const ans = new Set();
    WORDS.forEach(w => {
      if (getUa(w).some(u => shownUa.includes(u))) getEn(w).forEach(e => ans.add(e));
    });
    return [...ans].join(" / ");
  } else {
    return getUa(currentWord).join(" / ");
  }
}

function showCorrection(answer) {
  corrAnswerEl.textContent = answer;
  const enWord = mode === "en-ua" ? currentShown : getEn(currentWord)[0];
  const transEl = document.getElementById("correction-trans");
  const tr = TRANS[enWord] || "";
  transEl.textContent = tr;
  transEl.style.display = tr ? "" : "none";
  correctionEl.classList.remove("hidden");
  answerEl.classList.add("wrong");
  answerEl.disabled = true;
  awaitingAfterWrong = true;
  correctionTimer = setTimeout(() => {
    hideCorrection();
    if (waitingForLastAnswer) endGame();
    else nextWord();
  }, 3500);
}

function hideCorrection() {
  correctionEl.classList.add("hidden");
  answerEl.classList.remove("wrong");
  answerEl.disabled = false;
  awaitingAfterWrong = false;
  if (correctionTimer) { clearTimeout(correctionTimer); correctionTimer = null; }
}

function advanceAfterCorrection() {
  if (!awaitingAfterWrong) return;
  clearTimeout(correctionTimer); correctionTimer = null;
  hideCorrection();
  if (waitingForLastAnswer) endGame();
  else nextWord();
}

function handleInput() {
  if (awaitingAfterWrong || answerEl.value === "") return;
  if (isCorrect(answerEl.value)) {
    recordAnswer(answerEl.value, "correct");
    if (waitingForLastAnswer) endGame();
    else nextWord();
  }
}

function submitAnswer() {
  if (awaitingAfterWrong) { advanceAfterCorrection(); return; }
  if (answerEl.value.trim() === "") { skipWord(); return; }
  const correct = isCorrect(answerEl.value);
  recordAnswer(answerEl.value, correct ? "correct" : "wrong");
  if (correct) {
    if (waitingForLastAnswer) endGame();
    else nextWord();
  } else {
    showCorrection(getCorrectAnswer());
  }
}

function skipWord() {
  if (awaitingAfterWrong) { advanceAfterCorrection(); return; }
  recordAnswer(null, "skipped");
  showCorrection(getCorrectAnswer());
}

function recordAnswer(userVal, status) {
  records.push({ shown: currentShown, correct: getCorrectAnswer(), user: userVal, status });
  if (status === "correct") { score++; scoreEl.textContent = score; }
}

function tick() {
  timeLeft--;
  timerEl.textContent = timeLeft;
  if (timeLeft <= 10) timerEl.classList.add("low");
  if (timeLeft <= 0) {
    clearInterval(intervalId);
    intervalId = null;
    waitingForLastAnswer = true;
    timerEl.textContent = "⏰";
  }
}

function startGame() {
  score = 0; timeLeft = DURATION; records = [];
  currentFilter = "all";
  waitingForLastAnswer = false;
  awaitingAfterWrong = false;
  if (correctionTimer) { clearTimeout(correctionTimer); correctionTimer = null; }
  answerEl.disabled = false;
  scoreEl.textContent = "0";
  timerEl.textContent = DURATION;
  timerEl.classList.remove("low");
  shuffledIndices = shuffle([...Array(WORDS.length).keys()]);
  shufflePos = 0;

  modeHintEl.textContent = mode === "ua-en"
    ? "Перекладіть англійською:"
    : "Перекладіть українською:";

  startScreen.classList.add("hidden");
  endScreen.classList.add("hidden");
  gameEl.classList.remove("hidden");

  nextWord();
  intervalId = setInterval(tick, 1000);
}

function endGame() {
  if (correctionTimer) { clearTimeout(correctionTimer); correctionTimer = null; }
  correctionEl.classList.add("hidden");
  answerEl.disabled = false;
  if (intervalId) { clearInterval(intervalId); intervalId = null; }
  gameEl.classList.add("hidden");
  finalScoreEl.textContent = score;
  const wrong   = records.filter(r => r.status === "wrong").length;
  const skipped = records.filter(r => r.status === "skipped").length;
  summaryEl.textContent =
    "Правильних: " + score + " · Помилок: " + wrong + " · Пропущено: " + skipped;
  setFilter("all");
  endScreen.classList.remove("hidden");
}

function setFilter(f) {
  currentFilter = f;
  tabAll.classList.toggle("active", f === "all");
  tabBad.classList.toggle("active", f === "bad");
  renderList();
}

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function renderList() {
  const rows = records.filter(r =>
    currentFilter === "all" ? true : r.status !== "correct");

  if (rows.length === 0) {
    listEl.innerHTML = '<div class="empty">' +
      (currentFilter === "bad"
        ? "Жодної помилки чи пропуску — чудово!"
        : "Тут поки порожньо.") + "</div>";
    return;
  }

  listEl.innerHTML = rows.map(r => {
    const pair = esc(r.shown) + " = " + esc(r.correct);
    if (r.status === "correct") {
      return '<div class="row correct"><span>' + pair +
             '</span><span class="mark">✓</span></div>';
    } else if (r.status === "wrong") {
      return '<div class="row wrong"><span>' + pair +
             '</span><span class="mark">твоя: ' + esc(r.user) + ' ✗</span></div>';
    } else {
      return '<div class="row skipped"><span>' + pair +
             '</span><span class="mark">пропущено</span></div>';
    }
  }).join("");
}

answerEl.addEventListener("input", handleInput);
answerEl.addEventListener("keydown", e => { if (e.key === "Enter") submitAnswer(); });
document.getElementById("skip-btn").addEventListener("click", skipWord);
document.getElementById("start-btn").addEventListener("click", startGame);
document.getElementById("restart-btn").addEventListener("click", () => {
  endScreen.classList.add("hidden");
  startScreen.classList.remove("hidden");
});
tabAll.addEventListener("click", () => setFilter("all"));
tabBad.addEventListener("click", () => setFilter("bad"));
btnUaEn.addEventListener("click", () => setMode("ua-en"));
btnEnUa.addEventListener("click", () => setMode("en-ua"));

document.addEventListener("keydown", e => {
  if (e.key === "Enter" && !startScreen.classList.contains("hidden")) startGame();
});
</script>
</body>
</html>
